# Meeting Coach — Noah's personal rubric (v2)
# Trained from real meeting analysis. 9 triggers derived from observed patterns.
# The meta-lesson: you default to Socratic when you already know the answer.
# Your fastest unlock is "state the end state in sentence one."

version: 2
name: personal

cadence:
  heartbeat_seconds: 15
  extra_check_on_long_pause_seconds: 8
  extra_check_on_speaker_handoff: true

window:
  transcript_seconds: 300        # 5 min rolling window
  keep_running_summary: true

output:
  max_calls_per_trigger: 3
  min_confidence_to_show: 0.45   # lower floor — better to over-flag than miss

tiers:
  A: { min_confidence: 0.45 }    # ship these hot
  B: { min_confidence: 0.60 }    # moderate bar

signals:
  # --- TIER A: Ship first. These three alone cut the training meeting in half. ---

  - id: repetition_loop
    tier: A
    description: >
      You asked the same question or made the same point 2+ times in different words,
      and the room gave the same answer each time. You're not after an answer — you're
      after a document or commitment. Name it.
    nudge: "You've asked this twice. They answered. Name the deliverable you actually want."

  - id: escalation_rising
    tier: A
    description: >
      The other person's replies are getting shorter, more defensive, or include phrases
      like "I disagree", "that's actually what we do", "you already have an end goal",
      "fair", "sure" (resignation tokens). Temperature is rising.
    nudge: "Switch from advocacy to inquiry. Ask what THEY would build."

  - id: resolution_capture
    tier: A
    description: >
      A deliverable, owner, or next step was just stated clearly. Lock it with a name
      and date before the conversation drifts past it or you reopen it.
    nudge: "That's the deliverable. Lock owner and date, confirm, and stop."

  # --- TIER A: High-value structural catches ---

  - id: unaddressed_objection
    tier: A
    description: >
      Someone stated a counterpoint, concern, or framing ("it's an art and a science",
      "depends on the product", "that's not how it works") and you talked past it
      without acknowledging it. Fires when their objection appears 2+ times unaddressed.
    nudge: "They just gave you the central objection. Acknowledge it before pushing again."

  - id: stacked_asks
    tier: A
    description: >
      You issued 3+ asks, questions, or topics to the same person in a short window
      (one turn or a rapid series of turns) without closing or confirming any of them.
      Their acknowledgments ("yeah, okay", "I'll think about it") don't reset the count —
      only a closed ask does. The listener can only track one at a time.
    nudge: "You're stacking asks. Label them 1, 2, 3 and take one at a time."

  - id: global_negative
    tier: A
    description: >
      You said "we don't", "we never", "nobody does", "I don't think we do that" —
      a sweeping negative that makes the other person defend instead of inform.
    nudge: "Don't say 'we don't do X.' Say 'walk me through how we do X today.'"

  # --- TIER B: Tone and pattern detection ---

  - id: talk_time_imbalance
    tier: B
    description: >
      You've been talking significantly more than everyone else in the recent window.
      Over ~65% of the words are yours. Time to listen.
    nudge: "You're over 65% talk time. Ask one open question and go quiet."

  - id: hedge_not_pinned
    tier: B
    description: >
      A commitment or deliverable got softened from a date to vague language
      ("on my radar", "at some point", a range) with no new date stated, and it
      was accepted without pinning.
    nudge: "That's not a date. Pin one."

  - id: promise_vs_clock
    tier: B
    deterministic: true          # regex on explicit time-box phrases + wall clock, no LLM
    params: { multiplier: 3 }    # fire when elapsed exceeds 3x the stated box
    description: >
      You said "keep this short", "quick", "tight", "just two questions" but the
      meeting has continued well past that on the same topic.
    nudge: "You promised short. You're still on one topic. Park it or close it."

  - id: positive_reinforcement
    tier: A
    description: >
      Something good just happened — a clean specific ask, a direct action-item with
      owner and date, a good close, someone naming what they need clearly. Reinforce it.
    nudge: "Good. That was clean and specific. More of that."

end_of_meeting:
  - id: decision_playback
    description: A playback of every decision with its owner and date.
  - id: closer_prompt
    prompt: "What is the one thing you said today you don't think I heard?"
