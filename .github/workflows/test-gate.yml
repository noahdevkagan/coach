name: Test Gate

# The release workflow calls this (workflow_call), so EVERY release runs the
# full test gate on CI before anything is signed or published — the local
# pre-push gate can be skipped or unconfigured; this one cannot.
# workflow_dispatch lets you run the gate on demand without releasing.

on:
  workflow_dispatch:
  workflow_call:

jobs:
  gate:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_PATH="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 16.x on this runner image:" >&2
            ls -d /Applications/Xcode*.app >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build
        run: |
          cd MeetingCoach
          xcodegen
          set -o pipefail
          # No signing on the gate — the runner has no identity; the release
          # job signs separately (same flags as scripts/package-release.sh).
          xcodebuild -project MeetingCoach.xcodeproj -scheme MeetingCoach \
            -configuration Debug -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build 2>&1 | grep -E "error|warning: Run script|BUILD" || true
          test -d build/Build/Products/Debug/MeetingCoach.app

      # The real-time ASR transcript + echo suites are NOT run here: on
      # virtualized CI runners Parakeet underruns and scores ~35% WER vs the
      # 5% bar (validated 2026-07-17) — they need real hardware and stay in
      # the local push gate (scripts/push-gate.sh). CI enforces everything
      # deterministic.
      - name: Deterministic suites (nudges, rubric, detector, demo)
        run: |
          bash tests/nudges/run.sh
          bash tests/rubric/run.sh
          bash tests/detector/run.sh
          bash tests/demo/run.sh
